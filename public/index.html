<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            color: #2c3e50;
        }

        p {
            font-size: 18px;
            color: #555;
        }

        .card {
            background: white;
            padding: 30px;
            margin: auto;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>Hi, I'm AKASH 👋</h1>

            <p>
                DevOps / Cloud Enthusiast | Learning Docker, Kubernetes, AWS & CI/CD
            </p>

            <p>
                This application is running inside a Docker Multi-Stage container 
            </p>

            <a class="btn" href="https://github.com/" target="_blank">
                View My GitHub
            </a>

        </div>

    </div>

</body>

</html>
